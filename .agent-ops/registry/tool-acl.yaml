  tools:
    - repo_read
    - task_planning

product-manager:
  tools:
    - planning_docs

architecture:
  tools:
    - repo_read
    - architecture_docs

backend-builder:
  tools:
    - repo_read
    - repo_write_backend
    - run_backend_tests

frontend-builder:
  tools:
    - repo_read
    - repo_write_frontend
    - run_frontend_tests

data-engineer:
